[manifest]
version = '1.0.0'
dump_lua = true
priority = 0



#game info money bar
[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
match_indent = true
pattern = '''{n=G.UIT.C, config={align = "cm"}, nodes={
    {n=G.UIT.T, config={text = '  #', scale = 0.45, colour = G.C.UI.TEXT_LIGHT, shadow = true}}
}},'''
position = 'before'
payload = '''G.GAME.CN_money_bonus_given and ({ n = G.UIT.C, config = { align = 'cm', padding = 0.05, colour = G.C.L_BLACK, r = 0.1, minw = 0.9 }, nodes = {
  { n = G.UIT.T, config = { text = (G.GAME.hands[handname].CN_money and G.GAME.hands[handname].CN_money < 0) and  ('-' .. localize('$') .. math.abs(G.GAME.hands[handname].CN_money)) or (localize('$') .. (G.GAME.hands[handname].CN_money or 0)), scale = 0.45, colour = G.C.MONEY, shadow = true }},
}}) or nil,'''



#when downgrading the amount of chips or mult, when presenting a string value, squares blink red instead of green like normal, this solves this issue
[[patches]]
[patches.pattern]
target = 'functions/common_events.lua'
match_indent = true
pattern = '''if type(vals[name]) == 'string' then delta = vals[name] end'''
position = 'after'
payload = '''if type(delta) == 'string' and string.sub(delta, 1, 1) == '-' then col = G.C.RED end'''